<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>商户入网资料填写工具</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<header>
  <div class="wrap">
    <h1>商户入网资料填写工具</h1>
    <nav>
      <a href="#/select" data-step="select">1. 选择渠道</a>
      <a href="#/fill" data-step="fill">2. 填写资料</a>
      <a href="#/generate" data-step="generate">3. 生成文档</a>
    </nav>
    <div class="actions">
      <button id="btn-export">导出 JSON</button>
      <button id="btn-import">导入 JSON</button>
      <button id="btn-clear" class="danger">清空</button>
      <input type="file" id="file-import" accept="application/json" hidden>
    </div>
  </div>
</header>

<main id="app" class="wrap"></main>

<footer class="wrap">
  <small>数据仅保存在您当前浏览器，不会上传到任何服务器。建议定期"导出 JSON"备份。</small>
</footer>

<script src="vendor/jszip.min.js"></script>
<script src="vendor/exceljs.min.js"></script>
<script src="vendor/FileSaver.min.js"></script>
<script src="js/transforms.js"></script>
<script src="js/schema.js"></script>
<script src="js/storage.js"></script>
<script src="js/filler.js"></script>
<script src="js/app.js"></script>
</body>
</html>
